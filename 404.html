<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>404 - Page introuvable | Écuries du Grand Vignoble</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            color: #222;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 500px;
        }
        h1 {
            font-size: 8rem;
            font-weight: 700;
            color: #333;
            line-height: 1;
            margin-bottom: 1rem;
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #555;
        }
        p {
            margin-bottom: 2rem;
            color: #666;
        }
        a {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #222;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.2s;
        }
        a:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Cette page n'existe pas</h2>
        <p>La page que vous cherchez a peut-être été déplacée ou supprimée.</p>
        <a href="/">Retour à l'accueil</a>
    </div>
</body>
</html>
